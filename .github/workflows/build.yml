name: Build

concurrency: 
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          path: "src"

      - name: Checkout or create builds branch
        run: |
          git clone --depth 1 --branch builds https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY.git $GITHUB_WORKSPACE/builds || \
          (mkdir -p $GITHUB_WORKSPACE/builds && cd $GITHUB_WORKSPACE/builds && git init && git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY.git && git checkout --orphan builds)

      - name: Clean old builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          for f in *.cs3; do
            if [ "$f" != "rve.cs3" ]; then
              rm -f "$f"
            fi
          done

      - name: Setup JDK 17
        uses: actions/setup-java@v4.6.0
        with:
          distribution: "adopt"
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Build Plugins
        env:
          CASTLE_SUFFIX: ${{ secrets.CASTLE_SUFFIX }}
          MOVIEBOX_SECRET_KEY_DEFAULT: ${{ secrets.MOVIEBOX_SECRET_KEY_DEFAULT }}
          MOVIEBOX_SECRET_KEY_ALT: ${{ secrets.MOVIEBOX_SECRET_KEY_ALT }}
          CRICIFY_PROVIDER_SECRET1: ${{ secrets.CRICIFY_PROVIDER_SECRET1 }}
          CRICIFY_PROVIDER_SECRET2: ${{ secrets.CRICIFY_PROVIDER_SECRET2 }}
          CRICFY_FIREBASE_API_KEY: ${{ secrets.CRICFY_FIREBASE_API_KEY }}
          CRICFY_FIREBASE_APP_ID: ${{ secrets.CRICFY_FIREBASE_APP_ID }}
          CRICFY_FIREBASE_PROJECT_NUMBER: ${{ secrets.CRICFY_FIREBASE_PROJECT_NUMBER }}
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds
          # Merge: preserve rve entry in plugins.json
          if [ -f "$GITHUB_WORKSPACE/builds/plugins.json" ]; then
            python3 -c "
          import json
          try:
              with open('$GITHUB_WORKSPACE/builds/plugins.json') as f:
                  old = json.load(f)
              preserve = [p for p in old if p.get('internalName') in ('rve', 'netmirrorclone')]
              with open('/tmp/rve_entry.json', 'w') as f:
                  json.dump(preserve, f)
          except:
              with open('/tmp/rve_entry.json', 'w') as f:
                  json.dump([], f)
          "
          fi
          cp build/plugins.json $GITHUB_WORKSPACE/builds/plugins.json
          # Copy MirrorVerse binary as netmirrorclone
          cp $GITHUB_WORKSPACE/src/netmirrorclone.cs3 $GITHUB_WORKSPACE/builds/netmirrorclone.cs3
          python3 -c "
          import json, hashlib
          with open('$GITHUB_WORKSPACE/builds/plugins.json') as f:
              plugins = json.load(f)
          try:
              with open('/tmp/rve_entry.json') as f:
                  preserve = json.load(f)
              # Only add rve back
              rve = [p for p in preserve if p.get('internalName') == 'rve']
              if rve:
                  plugins.extend(rve)
          except:
              pass
          # Add netmirrorclone entry
          cs3_path = '$GITHUB_WORKSPACE/builds/netmirrorclone.cs3'
          with open(cs3_path, 'rb') as f:
              data = f.read()
          import os
          repo = os.environ.get('GITHUB_REPOSITORY', 'sevouz/cloudstream-extensions-sevouz')
          plugins = [p for p in plugins if p.get('internalName') != 'netmirrorclone']
          plugins.append({
              'iconUrl': 'https://github.com/NivinCNC/CNCVerse-Cloud-Stream-Extension/raw/refs/heads/master/CNC%20Verse/icon.png',
              'fileHash': 'sha256-' + hashlib.sha256(data).hexdigest(),
              'apiVersion': 1,
              'repositoryUrl': f'https://github.com/{repo}',
              'fileSize': len(data),
              'status': 1,
              'language': 'ta',
              'authors': ['sevouz'],
              'tvTypes': ['Movie', 'TvSeries'],
              'version': 38,
              'internalName': 'netmirrorclone',
              'description': 'Netflix, PrimeVideo, Disney+ Hotstar Contents in Multiple Languages',
              'url': f'https://raw.githubusercontent.com/{repo}/builds/netmirrorclone.cs3',
              'name': 'Nmirror'
          })
          with open('$GITHUB_WORKSPACE/builds/plugins.json', 'w') as f:
              json.dump(plugins, f, indent=4)
          "
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')
          cat > $GITHUB_WORKSPACE/builds/$REPO_NAME.json << EOF
          {
            "name": "$REPO_NAME",
            "iconUrl": "https://raw.githubusercontent.com/$GITHUB_REPOSITORY/master/icon.png",
            "description": "OTT Clone Plugins for Cloudstream",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/$GITHUB_REPOSITORY/builds/plugins.json"
            ]
          }
          EOF

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "Build $GITHUB_SHA" || git commit -m "Build $GITHUB_SHA" || exit 0
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY.git builds
